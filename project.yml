name: HidLens
options:
  bundleIdPrefix: com.hidlens
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  # KEXT Target — Kernel Extension for USB polling override
  # Uses "bundle" type with kext wrapper extension since XcodeGen doesn't have a native kext type
  HidLensDriver:
    type: bundle
    platform: macOS
    sources:
      - path: HidLensDriver
        includes:
          - "*.cpp"
          - "*.h"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidlens.driver
        MODULE_NAME: com.hidlens.driver
        MODULE_VERSION: "1.0"
        WRAPPER_EXTENSION: kext
        INFOPLIST_FILE: HidLensDriver/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        # KEXT-specific settings
        GCC_ENABLE_KERNEL_DEVELOPMENT: YES
        HEADER_SEARCH_PATHS:
          - "$(SDKROOT)/System/Library/Frameworks/Kernel.framework/Headers"
          - "$(SDKROOT)/System/Library/Frameworks/IOKit.framework/Headers"
        OTHER_LDFLAGS:
          - "-Xlinker"
          - "-kext"
          - "-nostdlib"
          - "-lkmod"
          - "-lkmodc++"
          - "-lcc_kext"
        LD_RUNPATH_SEARCH_PATHS: ""
        STANDARD_C_PLUS_PLUS_LIBRARY_TYPE: ""
        DEAD_CODE_STRIPPING: NO
        GCC_PREPROCESSOR_DEFINITIONS:
          - "KERNEL=1"
          - "KERNEL_PRIVATE=1"
          - "DRIVER_PRIVATE=1"
          - "APPLE=1"
          - "NeXT=1"
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_ENABLE_MODULES: NO
        GCC_ENABLE_CPP_EXCEPTIONS: NO
        GCC_ENABLE_CPP_RTTI: NO
        ARCHS: "$(ARCHS_STANDARD)"
        CODE_SIGN_IDENTITY: "-"
        GCC_WARN_UNINITIALIZED_AUTOS: NO
        MACH_O_TYPE: mh_kext_bundle

  # SwiftUI App Target
  HidLensApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/HidLensApp
    dependencies:
      - package: HidLensCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidlens.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: HidLens
        INFOPLIST_KEY_NSHumanReadableCopyright: "MIT License"
        CODE_SIGN_ENTITLEMENTS: Sources/HidLensApp/Entitlements/HidLensApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.9"
    postBuildScripts: []

packages:
  HidLensCore:
    path: .

schemes:
  HidLensDriver:
    build:
      targets:
        HidLensDriver:
          - running
          - testing
  HidLensApp:
    build:
      targets:
        HidLensApp:
          - running
          - testing
